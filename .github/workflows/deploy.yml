name: Build & Deploy

on:
  schedule:
    - cron: '0 * * * *'  # 每小时
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch data from Baidu hot search
        run: node scripts/fetch-data.cjs

      - name: Build frontend
        run: npm run build

      - name: Copy data into dist
        run: |
          mkdir -p dist/api
          cp data/*.json dist/api/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
